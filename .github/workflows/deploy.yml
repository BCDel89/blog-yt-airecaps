name: Build & Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/**'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: airecaps-blog
  DISTRIBUTION_ID: E18OBICLY2KJXM

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # For OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::273500459613:role/airecaps-blog-deploy-role
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          # Astro with base: /blog puts HTML under dist/blog/ but assets under dist/_astro/.
          # CloudFront serves /blog/* from S3, so assets must also be under blog/ prefix.
          cp -r dist/_astro dist/blog/_astro

          # Sync everything to S3 (removes stale files)
          aws s3 sync dist/ s3://$S3_BUCKET/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/blog/*"
